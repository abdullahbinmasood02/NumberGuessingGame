<!DOCTYPE html>
<html class="md:fonts" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>JavaScript Fundamentals – Part 1</title>
  <link href="./output.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">


</head>

<body class="font-['Press_Start_2P']">
  <div id="container" class="min-h-screen bg-black">

    <div class="flex justify-between">
      <div class="bg-white text-black p-8 m-5">
        Again!
      </div>

      <div class=" text-white p-8 m-5">
        Between 1 and 20
      </div>
    </div>

    <h1 class="text-4xl text-white text-center mt-6 mb-6">
      Guess My Number!
    </h1>

    <div class="flex justify-center mt-18 items-center">
      <div class="bg-white h-[2px] flex-[1]"></div>
      <p id="number" class="bg-white px-18 py-8 text-4xl">?</p>
      <div class="bg-white h-[2px] flex-[1]"></div>
    </div>

    <div class="flex mt-40">
      <div class="flex flex-[1] flex-col items-center">
        <input required type="number" id="guess" class="text-center p-8 border border-white w-[40%] text-white  focus:outline-none" />
        <Button id="check" class="bg-white w-[30%] px-8 py-4 mt-8 hover:bg-white/90 cursor-pointer ">Check!</Button>
      </div>



      <div class="flex flex-[1] flex-col pl-8">
        <div class="text-white mb-18">
          <p id="message">Start Guessing ...</p>
        </div>

        <div class="text-white">
          <p>💯 Score: <span id="score">20</span></p>
        </div>

        <div class="text-white mt-4">
          <p>🔥 Highscore: <span id="highScore">0</span></p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
